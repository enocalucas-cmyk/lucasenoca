<style>
  :root {
    --green: #6DBF3E;
    --green-glow: rgba(109,191,62,0.10);
    --bg: #080808;
    --bg2: #0f0f0f;
    --border: rgba(255,255,255,0.07);
    --text: #f0f0f0;
    --text-muted: #666;
    --font-display: 'Syne', sans-serif;
    --font-mono: 'DM Mono', monospace;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }

  body {
    background:
      radial-gradient(ellipse 70% 50% at 50% 0%, rgba(109,191,62,0.07) 0%, transparent 70%),
      #080808;
    color: var(--text);
    font-family: var(--font-display);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ─── NAV ─── */
  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 48px;
    background: rgba(8,8,8,0.85);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
  }

  .nav-logo {
    font-family: var(--font-mono);
    font-size: 12px;
    font-weight: 500;
    color: var(--green);
    letter-spacing: 0.04em;
    text-decoration: none;
  }

  .nav-links {
    display: flex;
    gap: 32px;
    list-style: none;
  }

  .nav-links a {
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-muted);
    text-decoration: none;
    transition: color .2s;
  }
  .nav-links a:hover,
  .nav-links a.active { color: var(--text); }
  .nav-links a.active::after {
    content: '';
    display: inline-block;
    width: 3px; height: 3px;
    background: var(--green);
    border-radius: 50%;
    margin-left: 5px;
    vertical-align: middle;
  }

  /* ─── MAIN ─── */
  main {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: calc(56px + 48px) 40px 60px;
    gap: 32px;
  }

  /* ─── HEADER ─── */
  .page-header {
    text-align: center;
    animation: fadeUp .6s cubic-bezier(.16,1,.3,1) .05s both;
  }

  .page-eyebrow {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--green);
    letter-spacing: 0.16em;
    text-transform: uppercase;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
  }
  .page-eyebrow::before,
  .page-eyebrow::after {
    content: '';
    width: 24px; height: 1px;
    background: var(--green);
    opacity: 0.5;
  }

  .page-title {
    font-size: clamp(32px, 5vw, 56px);
    font-weight: 800;
    letter-spacing: -0.03em;
    line-height: 1;
  }

  /* ─── PLAYER ─── */
  .player-wrap {
    width: 100%;
    max-width: 1100px;
    animation: fadeUp .7s cubic-bezier(.16,1,.3,1) .15s both;
  }

  .player {
    position: relative;
    width: 100%;
    aspect-ratio: 16/9;
    background: var(--bg2);
    border: 1px solid var(--border);
    overflow: hidden;
    cursor: pointer;
  }

  .player img {
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
  }

  .player-overlay {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(0,0,0,0.25);
    transition: background .2s;
  }
  .player:hover .player-overlay { background: rgba(0,0,0,0.4); }

  .play-btn {
    width: 72px; height: 72px;
    border: 1.5px solid rgba(109,191,62,0.8);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    backdrop-filter: blur(4px);
    background: rgba(0,0,0,0.3);
    transition: transform .2s, background .2s;
  }
  .player:hover .play-btn {
    transform: scale(1.08);
    background: rgba(109,191,62,0.15);
  }
  .play-btn::after {
    content: '';
    width: 0; height: 0;
    border-style: solid;
    border-width: 13px 0 13px 22px;
    border-color: transparent transparent transparent #6DBF3E;
    margin-left: 5px;
  }

  /* ─── CONTATOS ─── */
  .contacts {
    display: flex;
    align-items: stretch;
    gap: 0;
    flex-wrap: wrap;
    justify-content: center;
    width: 100%;
    max-width: 700px;
    animation: fadeUp .7s cubic-bezier(.16,1,.3,1) .25s both;
  }

  .contact-item {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 18px 28px;
    border: 1px solid var(--border);
    text-decoration: none;
    color: var(--text-muted);
    transition: border-color .2s, color .2s, background .2s;
    flex: 1;
    min-width: 200px;
  }
  .contact-item:not(:last-child) { border-right: none; }
  .contact-item:hover {
    border-color: rgba(109,191,62,0.3);
    color: var(--text);
    background: var(--green-glow);
  }

  .contact-icon { color: var(--green); opacity: 0.7; flex-shrink: 0; transition: opacity .2s; }
  .contact-item:hover .contact-icon { opacity: 1; }

  .contact-info { display: flex; flex-direction: column; gap: 4px; }
  .contact-type { font-family: var(--font-mono); font-size: 9px; letter-spacing: .12em; text-transform: uppercase; color: var(--text-muted); }
  .contact-value { font-family: var(--font-mono); font-size: 12px; color: var(--text); letter-spacing: 0.02em; }

  /* ─── FOOTER ─── */
  footer {
    text-align: center;
    padding: 20px;
    font-family: var(--font-mono);
    font-size: 10px;
    color: #333;
    letter-spacing: .06em;
    animation: fadeUp .7s cubic-bezier(.16,1,.3,1) .35s both;
  }

  /* ─── ANIMAÇÃO ─── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ─── RESPONSIVE ─── */
  @media (max-width: 600px) {
    nav { padding: 0 24px; }
    main { padding: calc(56px + 32px) 16px 40px; gap: 24px; }
    .contact-item {
      flex: 100%;
      border-right: 1px solid var(--border) !important;
      border-bottom: none;
      padding: 16px 20px;
    }
    .contact-item:last-child { border-bottom: 1px solid var(--border) !important; }
    .contacts { max-width: 100%; }
  }
</style>
